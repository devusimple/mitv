<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>MTV Player</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#238540">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/icon.png">

<link
    href="https://vjs.zencdn.net/8.23.4/video-js.css"
    rel="stylesheet"
/>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <section class="player-section">

        <video
            id="player"
            class="video-js vjs-default-skin"
            controls
            autoplay
            playsinline
            preload="auto"
        ></video>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading stream...</div>
        </div>

    </section>

    <section
        class="channels"
        id="channels"
    ></section>

    <footer class="footer">

        <div class="copyright">
            © <span id="year"></span> MTV. All Rights Reserved.
        </div>

        <div class="developer">
            Designed & Developed by Mehedi Hasan Uzzol
        </div>

        <div class="socials">
            <a
                href="https://facebook.com/huzzat77"
                target="_blank"
            >
                <img
                    src="./assets/logos/fb.png"
                    alt="Facebook"
                />
            </a>

            <a
                href="https://wa.me/8801310289950"
                target="_blank"
            >
                <img
                    src="./assets/logos/wa.png"
                    alt="WhatsApp"
                />
            </a>
        </div>

    </footer>

</div>

<div class="pwa-banner" id="pwaBanner">
    <div class="info">
        <img src="/assets/icon.png" alt="MTV Player">
        <div>
            <strong>MTV Player</strong><br>
            <small>Install for a better experience</small>
        </div>
    </div>
    <div class="actions">
        <button class="btn-close" id="pwaClose">Not now</button>
        <button class="btn-install" id="pwaInstall">Install</button>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
<script src="/app.js"></script>

</body>
</html>
